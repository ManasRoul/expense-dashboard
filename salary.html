<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Management - Financial Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="salary.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>💰 Salary Management</h1>
            <div class="header-actions">
                <a href="employee-salary.html" class="btn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">📊 Salary Report</a>
                <a href="dashboard.html" class="btn btn-secondary">← Dashboard</a>
                <a href="categories.html" class="btn btn-info">📊 Categories</a>
                <a href="form.html" class="btn btn-primary">+ New Entry</a>
            </div>
        </header>

        <div class="container salary-container">
        <p class="subtitle">Record salary payments for employees</p>

        <form id="salaryForm">
            <div class="form-group">
                <label for="salaryDate">📅 Payment Date</label>
                <input type="date" id="salaryDate" name="salaryDate" required>
            </div>

            <!-- Employee cards will be dynamically loaded -->
            <div id="employeeCards">
                <p class="loading-message">Loading employees...</p>
            </div>

            <div class="form-group total">
                <label for="totalSalary">Total Salary Payment</label>
                <input type="number" id="totalSalary" name="totalSalary" readonly value="0.00">
            </div>

            <button type="submit" class="btn btn-primary">💾 Save Salary Record</button>
        </form>

        <!-- Salary Records -->
        <div class="records-section">
            <h2>Recent Salary Records</h2>
            <div class="table-container">
                <table id="salaryTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Employees Paid</th>
                            <th>Total Amount</th>
                            <th>Details</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="salaryTableBody">
                        <tr>
                            <td colspan="5" class="loading-message">Loading records...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    </div>

    <!-- Salary Details Modal -->
    <div id="salaryModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Salary Payment Details</h2>
                <span class="close" onclick="closeSalaryModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p><strong>Payment Date:</strong> <span id="salaryModalDate"></span></p>
                <div id="salaryModalBody"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSalaryModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="salary.js"></script>
</body>
</html>

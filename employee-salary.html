<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Report</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            color: #1e293b;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .employees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .employee-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #3b82f6;
        }

        .employee-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .employee-header h2 {
            color: #1e40af;
            margin: 0;
            font-size: 1.5em;
        }

        .total-earned {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid #10b981;
            margin-bottom: 20px;
        }

        .total-earned .label {
            color: #065f46;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .total-earned .amount {
            color: #047857;
            font-size: 1.8em;
            font-weight: 700;
        }

        .payment-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #64748b;
        }

        .summary-card.advance {
            border-left-color: #f59e0b;
        }

        .summary-card.full {
            border-left-color: #10b981;
        }

        .summary-card .type {
            color: #64748b;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .summary-card .value {
            color: #1e293b;
            font-size: 1.3em;
            font-weight: 700;
        }

        .payments-header {
            color: #475569;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .payment-record {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #94a3b8;
            transition: all 0.3s ease;
        }

        .payment-record:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .payment-date {
            color: #64748b;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .payment-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .payment-detail-item {
            font-size: 0.9em;
            color: #475569;
        }

        .payment-detail-item strong {
            color: #334155;
        }

        .payment-type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .payment-type-badge.advance {
            background: #fef3c7;
            color: #92400e;
        }

        .payment-type-badge.full {
            background: #d1fae5;
            color: #065f46;
        }

        .payment-method-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .payment-method-badge.cash {
            background: #fef3c7;
            color: #92400e;
        }

        .payment-method-badge.upi {
            background: #dbeafe;
            color: #1e40af;
        }

        .payment-amount {
            color: #047857;
            font-size: 1.1em;
            font-weight: 700;
        }

        .payment-note {
            font-size: 0.85em;
            color: #64748b;
            font-style: italic;
            margin-top: 5px;
        }

        .no-records {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .btn-details {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            margin-top: 10px;
            width: 100%;
        }

        .btn-details:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 10001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            padding: 20px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.4em;
        }

        .modal-header .close {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .modal-header .close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            padding: 15px 25px;
            background: #f8fafc;
            border-radius: 0 0 12px 12px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .table-container {
            overflow-x: auto;
        }

        #employeeDetailsTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        #employeeDetailsTable thead {
            background: #f8fafc;
        }

        #employeeDetailsTable th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
        }

        #employeeDetailsTable td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }

        #employeeDetailsTable tbody tr:hover {
            background: #f8fafc;
        }

        .btn-secondary {
            padding: 10px 20px;
            background: #64748b;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        @media (max-width: 768px) {
            .employees-grid {
                grid-template-columns: 1fr;
            }

            .payment-details {
                grid-template-columns: 1fr;
            }

            .payment-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <script src="auth.js"></script>

    <div class="container">
        <div class="page-header">
            <a href="salary.html" class="back-button">← Back to Salary Page</a>
            <h1>Employee Salary Report</h1>
            <p style="color: #cbcfd6;">Complete salary history for all employees</p>
        </div>

        <div id="employeesContainer" class="employees-grid">
            <div class="loading">Loading salary records...</div>
        </div>
    </div>

    <!-- Employee Details Modal -->
    <div id="employeeDetailsModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h2 id="modalEmployeeName"></h2>
                <span class="close" onclick="closeEmployeeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="table-container">
                    <table id="employeeDetailsTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Method</th>
                                <th>Note</th>
                            </tr>
                        </thead>
                        <tbody id="employeeDetailsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEmployeeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="employee-salary.js"></script>
</body>
</html>

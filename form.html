<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income/Receipt Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="nav-links">
        <a href="dashboard.html" class="nav-btn">← Dashboard</a>
        <a href="categories.html" class="nav-btn">📊 Categories</a>
    </div>
    <div class="container">
        <h1>Financial Form</h1>
        
        <form id="financialForm">
            <!-- Date Selection Section -->
            <div class="section date-section">
                <div class="form-group">
                    <label for="entryDate">📅 Entry Date</label>
                    <input type="date" id="entryDate" name="entryDate" required>
                    <small class="form-hint">Select the date for this transaction (defaults to today)</small>
                </div>
            </div>

            <!-- Opening Balance Section -->
            <div class="section">
                <h2>1. Opening Balance (₹)</h2>
                <div class="form-group">
                    <input type="number" id="openingBalance" name="openingBalance" step="0.01" placeholder="Enter opening balance (₹)">
                </div>
            </div>

            <!-- Income/Receipt Section -->
            <div class="section">
                <h2>2. Income/Receipt</h2>

                <!-- Receipt Categories -->
                <div class="receipt-items">
                    <!-- <h3>Receipt Categories</h3> -->
                    
                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Room Rent</label>
                        <div class="input-group">
                            <select id="roomRentMethod" name="roomRentMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="roomRent" name="roomRent" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Mattress Charge</label>
                        <div class="input-group">
                            <select id="mattressChargeMethod" name="mattressChargeMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="mattressCharge" name="mattressCharge" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Travel/Cab Service</label>
                        <div class="input-group">
                            <select id="travelCabMethod" name="travelCabMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="travelCab" name="travelCab" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Kitchen Facility</label>
                        <div class="input-group">
                            <select id="kitchenFacilityMethod" name="kitchenFacilityMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="kitchenFacility" name="kitchenFacility" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Cleaning Charge</label>
                        <div class="input-group">
                            <select id="cleanChargeMethod" name="cleanChargeMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="cleanCharge" name="cleanCharge" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Misc Receipt</label>
                        <div class="input-group">
                            <select id="miscReceiptMethod" name="miscReceiptMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="miscReceipt" name="miscReceipt" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>
                </div>

                <!-- Total Income -->
                <div class="form-group total">
                    <label for="totalIncome">Total Income/Receipt (₹)</label>
                    <input type="number" id="totalIncome" name="totalIncome" step="0.01" readonly>
                </div>
            </div>

            <!-- Expense/Payment Section -->
            <div class="section">
                <h2>3. Expense/Payment</h2>

                <!-- Expense Categories -->
                <div class="receipt-items">
                    <!-- <h3>Expense Categories</h3> -->
                    
                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Brokerage</label>
                        <div class="input-group">
                            <select id="brokerageMethod" name="brokerageMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="brokerage" name="brokerage" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Salary</label>
                        <div class="input-group">
                            <select id="salaryMethod" name="salaryMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="salary" name="salary" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Room Cleaning Charge</label>
                        <div class="input-group">
                            <select id="roomCleaningChargeMethod" name="roomCleaningChargeMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="roomCleaningCharge" name="roomCleaningCharge" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Generator & Maintenance</label>
                        <div class="input-group">
                            <select id="generatorMaintenanceMethod" name="generatorMaintenanceMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="generatorMaintenance" name="generatorMaintenance" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Hotel Stationary</label>
                        <div class="input-group">
                            <select id="hotelStationaryMethod" name="hotelStationaryMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="hotelStationary" name="hotelStationary" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Hotel Cleaning and Sanitation</label>
                        <div class="input-group">
                            <select id="hotelCleaningSanitationMethod" name="hotelCleaningSanitationMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="hotelCleaningSanitation" name="hotelCleaningSanitation" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Rent & Taxes</label>
                        <div class="input-group">
                            <select id="rentTaxesMethod" name="rentTaxesMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="rentTaxes" name="rentTaxes" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>TV Recharge</label>
                        <div class="input-group">
                            <select id="tvRechargeMethod" name="tvRechargeMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="tvRecharge" name="tvRecharge" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Camera/WiFi</label>
                        <div class="input-group">
                            <select id="cameraWifiMethod" name="cameraWifiMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="cameraWifi" name="cameraWifi" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Plumbing & Maintenance</label>
                        <div class="input-group">
                            <select id="plumbingMaintenanceMethod" name="plumbingMaintenanceMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="plumbingMaintenance" name="plumbingMaintenance" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Electricity & Maintenance</label>
                        <div class="input-group">
                            <select id="electricityMaintenanceMethod" name="electricityMaintenanceMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="electricityMaintenance" name="electricityMaintenance" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Electricity Bill</label>
                        <div class="input-group">
                            <select id="electricityBillMethod" name="electricityBillMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="electricityBill" name="electricityBill" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Staff Fooding</label>
                        <div class="input-group">
                            <select id="staffFoodingMethod" name="staffFoodingMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="staffFooding" name="staffFooding" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Laundry</label>
                        <div class="input-group">
                            <select id="laundryMethod" name="laundryMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="laundry" name="laundry" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Owner Kitchen & Cab Payment</label>
                        <div class="input-group">
                            <select id="ownerKitchenCabMethod" name="ownerKitchenCabMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="ownerKitchenCab" name="ownerKitchenCab" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Office Stationary</label>
                        <div class="input-group">
                            <select id="officeStationaryMethod" name="officeStationaryMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="officeStationary" name="officeStationary" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>

                    <div class="form-row">
                        <label><span class="badge-bullet"></span>Misc Expenses</label>
                        <div class="input-group">
                            <select id="miscExpensesMethod" name="miscExpensesMethod" class="payment-select">
                                <option value="">Payment</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                            </select>
                            <input type="number" id="miscExpenses" name="miscExpenses" step="0.01" placeholder="0.00" class="amount-input">
                        </div>
                    </div>
                </div>

                <!-- Total Expense -->
                <div class="form-group total">
                    <label for="totalExpense">Total Expense/Payment (₹)</label>
                    <input type="number" id="totalExpense" name="totalExpense" step="0.01" readonly>
                </div>
            </div>

            <!-- Closing Balance Section -->
            <div class="section closing-balance-section">
                <h2>4. Closing Balance (₹)</h2>
                <div class="form-group total">
                    <input type="number" id="closingBalance" name="closingBalance" step="0.01" readonly>
                </div>
                <!-- <p class="balance-formula">Formula: Opening Balance + Total Income - Total Expense</p> -->
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="button" class="btn btn-calculate" onclick="calculateTotal()">Calculate Total</button>
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>

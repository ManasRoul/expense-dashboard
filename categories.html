<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category-wise Dashboard</title>
    <link rel="stylesheet" href="categories.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>📊 Category-wise Income & Expense Dashboard</h1>
            <div class="header-actions">
                <a href="dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
                <a href="form.html" class="btn btn-primary">+ New Entry</a>
                <button onclick="refreshData(this)" class="btn btn-secondary">🔄 Refresh</button>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="summary-grid">
            <div class="summary-card income-summary">
                <div class="summary-icon">💰</div>
                <div class="summary-content">
                    <h3>Total Income</h3>
                    <div class="summary-amount" id="totalIncome">₹0.00</div>
                </div>
            </div>
            <div class="summary-card expense-summary">
                <div class="summary-icon">💸</div>
                <div class="summary-content">
                    <h3>Total Expenses</h3>
                    <div class="summary-amount" id="totalExpense">₹0.00</div>
                </div>
            </div>
        </div>

        <!-- Income Categories Section -->
        <div class="categories-section">
            <h2 class="section-title">💵 Income Categories</h2>
            <div class="categories-grid" id="incomeGrid">
                <div class="loading-message">Loading income categories...</div>
            </div>
        </div>

        <!-- Expense Categories Section -->
        <div class="categories-section">
            <h2 class="section-title">💳 Expense Categories</h2>
            <div class="categories-grid" id="expenseGrid">
                <div class="loading-message">Loading expense categories...</div>
            </div>
        </div>

        <!-- Details Modal -->
        <div id="categoryModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Category Details</h2>
                    <button class="modal-close" onclick="closeDetailsModal()">&times;</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <div class="loading-message">Loading details...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="categories.js"></script>
</body>
</html>
